<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Team Wiki</title>
  <link rel="stylesheet" href="/css/modern-styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <a href="/dashboard.html" class="sidebar__brand">
          <div class="sidebar__brand-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            </svg>
          </div>
          <span>Team Wiki</span>
        </a>
      </div>

      <nav class="sidebar__nav">
        <div class="sidebar__section">
          <p class="sidebar__section-title">Main</p>
          <a href="/dashboard.html" class="sidebar__link active">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
            </svg>
            <span>Dashboard</span>
          </a>
          <a href="/my-articles.html" class="sidebar__link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <span>My Articles</span>
          </a>
          <a href="/shared.html" class="sidebar__link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            <span>Shared With Me</span>
          </a>
        </div>

        <div class="sidebar__section">
          <p class="sidebar__section-title">Actions</p>
          <a href="/create.html" class="sidebar__link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            <span>Create Article</span>
          </a>
          <a href="/search.html" class="sidebar__link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <span>Search</span>
          </a>
        </div>

        <div class="sidebar__section">
          <p class="sidebar__section-title">Settings</p>
          <a href="/settings.html" class="sidebar__link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            <span>Settings</span>
          </a>
          <a href="#" class="sidebar__link" id="logout-link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            <span>Logout</span>
          </a>
        </div>
      </nav>

      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="sidebar__user-avatar" id="user-avatar">U</div>
          <div class="sidebar__user-info">
            <div class="sidebar__user-name" id="user-name">User</div>
            <div class="sidebar__user-role" id="user-role">Editor</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Header -->
      <header class="top-header">
        <div class="top-header__left">
          <button class="mobile-menu-btn" id="mobile-menu-btn">
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
          <h1 class="top-header__title">Dashboard</h1>
        </div>
        <div class="top-header__right">
          <a href="/create.html" class="btn btn--primary btn--sm">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right: 6px;">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            New Article
          </a>
        </div>
      </header>

      <!-- Content -->
      <div class="content-wrapper">
        <!-- Stats -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-card__icon stat-card__icon--blue">📝</div>
            <div class="stat-card__content">
              <div class="stat-card__value" id="stat-total">0</div>
              <div class="stat-card__label">Total Articles</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card__icon stat-card__icon--green">✏️</div>
            <div class="stat-card__content">
              <div class="stat-card__value" id="stat-owned">0</div>
              <div class="stat-card__label">My Articles</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card__icon stat-card__icon--yellow">🤝</div>
            <div class="stat-card__content">
              <div class="stat-card__value" id="stat-shared">0</div>
              <div class="stat-card__label">Shared With Me</div>
            </div>
          </div>
        </div>

        <!-- Page Header -->
        <div class="page-header">
          <div class="page-header__left">
            <h2 class="page-header__title">Recent Articles</h2>
            <p class="page-header__subtitle">View and manage your recent documents</p>
          </div>
          <div class="page-header__actions">
            <div class="search-box">
              <svg class="search-box__icon" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
              <input type="text" class="search-box__input" id="search-input" placeholder="Search articles...">
            </div>
          </div>
        </div>

        <!-- Articles Grid -->
        <div class="article-grid" id="articles-grid">
          <!-- Loading State -->
          <div class="card">
            <div class="skeleton" style="height: 20px; width: 70%; margin-bottom: 12px;"></div>
            <div class="skeleton" style="height: 14px; width: 50%; margin-bottom: 8px;"></div>
            <div class="skeleton" style="height: 14px; width: 40%;"></div>
          </div>
          <div class="card">
            <div class="skeleton" style="height: 20px; width: 60%; margin-bottom: 12px;"></div>
            <div class="skeleton" style="height: 14px; width: 45%; margin-bottom: 8px;"></div>
            <div class="skeleton" style="height: 14px; width: 35%;"></div>
          </div>
          <div class="card">
            <div class="skeleton" style="height: 20px; width: 75%; margin-bottom: 12px;"></div>
            <div class="skeleton" style="height: 14px; width: 55%; margin-bottom: 8px;"></div>
            <div class="skeleton" style="height: 14px; width: 45%;"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script>
    // Initialize dashboard
    initDashboard();
    initSidebar();
    loadDashboardData();

    // Load dashboard data
    async function loadDashboardData() {
      try {
        const articles = await WikiAPI.getArticles();
        const user = WikiAPI.getUser();
        
        // Calculate stats
        const ownedArticles = articles.filter(a => a.owner === user?.id || a.author === user?.username);
        const sharedArticles = articles.filter(a => a.owner !== user?.id && a.author !== user?.username);
        
        document.getElementById('stat-total').textContent = articles.length;
        document.getElementById('stat-owned').textContent = ownedArticles.length;
        document.getElementById('stat-shared').textContent = sharedArticles.length;
        
        // Display recent articles (last 6)
        const recentArticles = articles
          .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt))
          .slice(0, 6);
        
        renderArticles(recentArticles);
      } catch (err) {
        showToast('Failed to load articles', 'error');
        console.error(err);
      }
    }

    // Render articles
    function renderArticles(articles) {
      const grid = document.getElementById('articles-grid');
      
      if (articles.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <div class="empty-state__icon">📝</div>
            <h3 class="empty-state__title">No articles yet</h3>
            <p class="empty-state__text">Create your first article to get started with your team wiki.</p>
            <a href="/create.html" class="btn btn--primary mt-4">Create Article</a>
          </div>
        `;
        return;
      }
      
      grid.innerHTML = articles.map(article => {
        const user = WikiAPI.getUser();
        const isOwner = article.owner === user?.id || article.author === user?.username;
        const role = isOwner ? 'Owner' : (article.currentUserPermission === 'editor' ? 'Editor' : 'Viewer');
        const roleClass = role === 'Owner' ? 'badge--owner' : (role === 'Editor' ? 'badge--editor' : 'badge--viewer');
        
        return `
          <a href="/article.html?id=${article._id}" class="card card--clickable" style="text-decoration: none; color: inherit;">
            <div class="card__header">
              <div>
                <h3 class="card__title">${escapeHtml(article.title)}</h3>
                <div class="card__meta mt-1">
                  <span class="card__meta-item">
                    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    ${escapeHtml(article.author)}
                  </span>
                </div>
              </div>
              <span class="badge ${roleClass}">${role}</span>
            </div>
            <div class="card__footer">
              <span class="card__meta-item">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                ${formatDate(article.updatedAt)}
              </span>
              ${article.tags && article.tags.length ? `
                <span class="tag">${article.tags[0]}${article.tags.length > 1 ? ` +${article.tags.length - 1}` : ''}</span>
              ` : ''}
            </div>
          </a>
        `;
      }).join('');
    }

    // Search functionality
    document.getElementById('search-input').addEventListener('input', debounce(async (e) => {
      const query = e.target.value.trim();
      try {
        const articles = query 
          ? await WikiAPI.searchArticles(query)
          : await WikiAPI.getArticles();
        const recentArticles = articles
          .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt))
          .slice(0, 6);
        renderArticles(recentArticles);
      } catch (err) {
        console.error('Search error:', err);
      }
    }, 300));

    // Utility functions
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);
      
      if (diffMins < 1) return 'Just now';
      if (diffMins < 60) return `${diffMins}m ago`;
      if (diffHours < 24) return `${diffHours}h ago`;
      if (diffDays < 7) return `${diffDays}d ago`;
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }

    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast toast--${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4500);
    }
  </script>
</body>
</html>
