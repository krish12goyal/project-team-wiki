<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Article - Team Wiki</title>
  <link rel="stylesheet" href="/css/modern-styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <a href="/dashboard.html" class="sidebar__brand">
          <div class="sidebar__brand-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            </svg>
          </div>
          <span>Team Wiki</span>
        </a>
      </div>

      <nav class="sidebar__nav">
        <div class="sidebar__section">
          <p class="sidebar__section-title">Main</p>
          <a href="/dashboard.html" class="sidebar__link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
            </svg>
            <span>Dashboard</span>
          </a>
          <a href="/my-articles.html" class="sidebar__link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <span>My Articles</span>
          </a>
          <a href="/shared.html" class="sidebar__link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            <span>Shared With Me</span>
          </a>
        </div>

        <div class="sidebar__section">
          <p class="sidebar__section-title">Actions</p>
          <a href="/create.html" class="sidebar__link active">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            <span>Create Article</span>
          </a>
          <a href="/search.html" class="sidebar__link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <span>Search</span>
          </a>
        </div>

        <div class="sidebar__section">
          <p class="sidebar__section-title">Settings</p>
          <a href="/settings.html" class="sidebar__link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            <span>Settings</span>
          </a>
          <a href="#" class="sidebar__link" id="logout-link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            <span>Logout</span>
          </a>
        </div>
      </nav>

      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="sidebar__user-avatar" id="user-avatar">U</div>
          <div class="sidebar__user-info">
            <div class="sidebar__user-name" id="user-name">User</div>
            <div class="sidebar__user-role" id="user-role">Editor</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Editor Container -->
      <div class="editor-container" style="margin: 24px; min-height: calc(100vh - 48px);">
        <!-- Editor Header -->
        <div class="editor-header">
          <div style="flex: 1;">
            <input 
              type="text" 
              class="editor-title-input" 
              id="article-title" 
              placeholder="Untitled Article"
              autocomplete="off"
            >
          </div>
          <div class="flex gap-2">
            <button class="btn btn--secondary btn--sm" id="toggle-preview-btn">Preview: ON</button>
            <span id="save-status" style="font-size: 0.875rem; color: var(--text-muted); display: flex; align-items: center;"></span>
            <button class="btn btn--secondary btn--sm" id="cancel-btn">Cancel</button>
            <button class="btn btn--primary btn--sm" id="save-btn">Save Article</button>
          </div>
        </div>

        <!-- Editor Toolbar -->
        <div class="editor-toolbar">
          <button type="button" class="editor-toolbar__btn" onclick="insertMarkdown('**', '**')" title="Bold">
            <strong>B</strong>
          </button>
          <button type="button" class="editor-toolbar__btn" onclick="insertMarkdown('*', '*')" title="Italic">
            <em>I</em>
          </button>
          <button type="button" class="editor-toolbar__btn" onclick="insertMarkdown('# ' , '')" title="Heading">
            H
          </button>
          <button type="button" class="editor-toolbar__btn" onclick="insertMarkdown('- ' , '')" title="List">
            ☰
          </button>
          <button type="button" class="editor-toolbar__btn" onclick="insertMarkdown('> ' , '')" title="Quote">
            "
          </button>
          <button type="button" class="editor-toolbar__btn" onclick="insertMarkdown('```\n', '\n```')" title="Code Block">
            {'</>'}
          </button>
          <button type="button" class="editor-toolbar__btn" onclick="insertMarkdown('[', '](url)')" title="Link">
            🔗
          </button>
          <div style="margin-left: auto; display: flex; align-items: center; gap: 8px;">
            <div style="width: 1px; height: 22px; background: var(--border-light); margin-right: 8px;"></div>
            <label style="font-size: 0.875rem; color: var(--text-muted);">Tags:</label>
            <input 
              type="text" 
              class="input" 
              id="article-tags" 
              placeholder="Add tags (comma separated)"
              style="width: 200px; padding: 6px 10px; font-size: 0.8125rem;"
            >
          </div>
        </div>

        <!-- Editor Content -->
        <div class="editor-content" style="display: flex; gap: 24px; height: calc(100vh - 220px);">
          <!-- Left: Markdown Input -->
          <div id="editor-pane" style="flex: 1; display: flex; flex-direction: column; border: 1px solid #e2e8f0; border-radius: 12px; background: #ffffff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); min-width: 0;">
            <div style="padding: 12px 16px; border-bottom: 1px solid #e2e8f0; background: #f8fafc; border-radius: 12px 12px 0 0; font-weight: 600; font-size: 0.875rem; color: #475569;">Markdown Source</div>
            <textarea class="editor-textarea" id="article-content"
              placeholder="Start writing your article here..." style="flex: 1; resize: none; border: none; outline: none; padding: 16px; background: transparent; font-family: monospace; font-size: 0.95rem; overflow-x: hidden; word-wrap: break-word; white-space: pre-wrap;"></textarea>
          </div>
          <!-- Right: Live Preview -->
          <div id="preview-pane" style="flex: 1; display: flex; flex-direction: column; border: 1px solid #e2e8f0; border-radius: 12px; background: #ffffff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); min-width: 0;">
            <div style="padding: 12px 16px; border-bottom: 1px solid #e2e8f0; background: #f8fafc; border-radius: 12px 12px 0 0; font-weight: 600; font-size: 0.875rem; color: #475569;">Live Preview</div>
            <div style="flex: 1; overflow-y: auto; overflow-x: hidden; padding: 24px; min-width: 0;">
              <div id="editor-preview" class="markdown-body" style="word-wrap: break-word; overflow-wrap: break-word; word-break: break-word; min-width: 0;"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.0/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@14.1.0/marked.min.js"></script>
  <script>
    // Initialize
    initDashboard();
    initSidebar();
    initEditor();

    function initEditor() {
      const titleInput = document.getElementById('article-title');
      const contentInput = document.getElementById('article-content');
      const tagsInput = document.getElementById('article-tags');
      const saveBtn = document.getElementById('save-btn');
      const cancelBtn = document.getElementById('cancel-btn');
      const saveStatus = document.getElementById('save-status');
      const togglePreviewBtn = document.getElementById('toggle-preview-btn');
      const previewPane = document.getElementById('preview-pane');
      const editorPreview = document.getElementById('editor-preview');

      // Toggle Preview
      let previewOn = true;
      togglePreviewBtn.addEventListener('click', () => {
        previewOn = !previewOn;
        if (previewOn) {
          previewPane.style.display = 'block';
          togglePreviewBtn.textContent = 'Preview: ON';
        } else {
          previewPane.style.display = 'none';
          togglePreviewBtn.textContent = 'Preview: OFF';
        }
      });

      function renderPreview() {
        if (!previewOn) return;
        editorPreview.innerHTML = DOMPurify.sanitize(marked.parse(contentInput.value || ''));
      }

      // Auto-resize textarea & live preview
      contentInput.addEventListener('input', function() {
        renderPreview();
      });

      // Save article
      saveBtn.addEventListener('click', async () => {
        const title = titleInput.value.trim();
        const content = contentInput.value.trim();
        const tags = tagsInput.value.split(',').map(t => t.trim()).filter(Boolean);

        if (!title) {
          showToast('Please enter a title', 'error');
          titleInput.focus();
          return;
        }

        if (!content) {
          showToast('Please enter some content', 'error');
          contentInput.focus();
          return;
        }

        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';
        saveStatus.textContent = 'Saving...';

        try {
          const data = await WikiAPI.createArticle({ title, content, tags });
          showToast('Article created successfully!', 'success');
          
          // Clear any offline draft
          clearOfflineDraft();
          
          // Redirect to the article
          setTimeout(() => {
            window.location.href = `/article.html?id=${data._id}`;
          }, 500);
        } catch (err) {
          showToast(err.message || 'Failed to save article', 'error');
          
          // Save offline draft
          saveOfflineDraft({ title, content, tags });
          saveStatus.textContent = 'Saved offline';
          
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save Article';
        }
      });

      // Cancel button
      cancelBtn.addEventListener('click', () => {
        if (confirm('Are you sure you want to cancel? Any unsaved changes will be lost.')) {
          window.location.href = '/dashboard.html';
        }
      });

      // Auto-save offline draft
      let autoSaveTimer;
      const saveDraft = () => {
        const title = titleInput.value.trim();
        const content = contentInput.value.trim();
        const tags = tagsInput.value.split(',').map(t => t.trim()).filter(Boolean);
        
        if (title || content) {
          saveOfflineDraft({ title, content, tags });
          saveStatus.textContent = 'Draft saved locally';
        }
      };

      titleInput.addEventListener('input', () => {
        clearTimeout(autoSaveTimer);
        autoSaveTimer = setTimeout(saveDraft, 2000);
      });

      contentInput.addEventListener('input', () => {
        clearTimeout(autoSaveTimer);
        autoSaveTimer = setTimeout(saveDraft, 2000);
      });

      // Check for offline draft on load
      const draft = getOfflineDraft();
      if (draft) {
        if (confirm('You have an unsaved draft. Would you like to restore it?')) {
          titleInput.value = draft.title || '';
          contentInput.value = draft.content || '';
          tagsInput.value = (draft.tags || []).join(', ');
          showToast('Draft restored', 'info');
        } else {
          clearOfflineDraft();
        }
      }

      // Render initial preview
      renderPreview();

      // Focus title on load
      titleInput.focus();
    }

    // Insert markdown at cursor
    window.insertMarkdown = function(before, after) {
      const textarea = document.getElementById('article-content');
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      const text = textarea.value;
      const selection = text.substring(start, end);
      
      const newText = text.substring(0, start) + before + selection + after + text.substring(end);
      textarea.value = newText;
      
      // Restore cursor position
      const newCursorPos = start + before.length + selection.length;
      textarea.setSelectionRange(newCursorPos, newCursorPos);
      textarea.focus();
    };

    // Offline draft functions
    function saveOfflineDraft(data) {
      localStorage.setItem('wiki_create_draft', JSON.stringify({
        ...data,
        savedAt: Date.now()
      }));
    }

    function getOfflineDraft() {
      const draft = localStorage.getItem('wiki_create_draft');
      return draft ? JSON.parse(draft) : null;
    }

    function clearOfflineDraft() {
      localStorage.removeItem('wiki_create_draft');
    }
  </script>
</body>
</html>
