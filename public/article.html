<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Article - Team Wiki</title>
  <link rel="stylesheet" href="/css/modern-styles.css">
</head>

<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <a href="/dashboard.html" class="sidebar__brand">
          <div class="sidebar__brand-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            </svg>
          </div>
          <span>Team Wiki</span>
        </a>
      </div>

      <nav class="sidebar__nav">
        <div class="sidebar__section">
          <p class="sidebar__section-title">Main</p>
          <a href="/dashboard.html" class="sidebar__link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
            </svg>
            <span>Dashboard</span>
          </a>
          <a href="/my-articles.html" class="sidebar__link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <span>My Articles</span>
          </a>
          <a href="/shared.html" class="sidebar__link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <span>Shared With Me</span>
          </a>
        </div>

        <div class="sidebar__section">
          <p class="sidebar__section-title">Actions</p>
          <a href="/create.html" class="sidebar__link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            <span>Create Article</span>
          </a>
          <a href="/search.html" class="sidebar__link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <span>Search</span>
          </a>
        </div>

        <div class="sidebar__section">
          <p class="sidebar__section-title">Settings</p>
          <a href="/settings.html" class="sidebar__link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span>Settings</span>
          </a>
          <a href="#" class="sidebar__link" id="logout-link">
            <svg class="sidebar__link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            <span>Logout</span>
          </a>
        </div>
      </nav>

      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="sidebar__user-avatar" id="user-avatar">U</div>
          <div class="sidebar__user-info">
            <div class="sidebar__user-name" id="user-name">User</div>
            <div class="sidebar__user-role" id="user-role">Editor</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Header -->
      <header class="top-header">
        <div class="top-header__left">
          <button class="mobile-menu-btn" id="mobile-menu-btn">
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <h1 class="top-header__title">View Article</h1>
        </div>
        <div class="top-header__right" id="header-actions">
          <!-- Actions will be inserted here -->
        </div>
      </header>

      <!-- Content -->
      <div class="content-wrapper">
        <div class="article-view" id="article-container">
          <!-- Loading State -->
          <div class="article-view__header">
            <div class="skeleton" style="height: 40px; width: 70%; margin-bottom: 16px;"></div>
            <div class="skeleton" style="height: 20px; width: 40%;"></div>
          </div>
          <div class="article-view__content">
            <div class="skeleton" style="height: 16px; width: 100%; margin-bottom: 12px;"></div>
            <div class="skeleton" style="height: 16px; width: 95%; margin-bottom: 12px;"></div>
            <div class="skeleton" style="height: 16px; width: 90%; margin-bottom: 12px;"></div>
            <div class="skeleton" style="height: 16px; width: 85%;"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Share Modal -->
  <div class="modal-overlay" id="share-modal">
    <div class="modal">
      <div class="modal__header">
        <h3 class="modal__title">Share Article</h3>
        <button class="modal__close" onclick="closeShareModal()">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="modal__body">
        <div class="form-group">
          <label class="form-group__label">Add people by email or username</label>
          <div style="display: flex; gap: 8px;">
            <input type="text" class="input" id="share-email" placeholder="Enter email or username" style="flex: 1;">
            <select class="select" id="share-role" style="width: 120px;">
              <option value="viewer">Viewer</option>
              <option value="editor">Editor</option>
            </select>
            <button class="btn btn--primary" id="share-add-btn">Add</button>
          </div>
        </div>

        <div class="mt-4">
          <p class="form-group__label mb-2">People with access</p>
          <div class="share-list" id="share-list">
            <!-- Share list items will be inserted here -->
          </div>
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--secondary" onclick="closeShareModal()">Done</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.0/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@14.1.0/marked.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script>
    let currentArticle = null;
    let articleId = null;

    // Initialize
    initDashboard();
    initSidebar();
    loadArticle();

    async function loadArticle() {
      articleId = new URLSearchParams(window.location.search).get('id');

      if (!articleId) {
        showToast('No article ID provided', 'error');
        window.location.href = '/dashboard.html';
        return;
      }

      try {
        const article = await WikiAPI.getArticle(articleId);
        currentArticle = article;
        await renderArticle(article);
        renderHeaderActions(article);
      } catch (err) {
        showToast('Failed to load article', 'error');
        console.error('Error in loadArticle:', err);
      }
    }

    async function renderArticle(article) {
      const container = document.getElementById('article-container');
      const user = WikiAPI.getUser();
      const rawRole = article.currentPermission || 'viewer';
      const role = rawRole.charAt(0).toUpperCase() + rawRole.slice(1);

      // Render markdown content
      let contentHtml = '';
      if (window.marked && article.content) {
        try {
          const raw = await marked.parse(article.content);
          contentHtml = window.DOMPurify ? DOMPurify.sanitize(raw) : raw;
        } catch (err) {
          console.error('Error parsing markdown:', err);
          contentHtml = escapeHtml(article.content || '');
        }
      } else {
        contentHtml = escapeHtml(article.content || '');
      }

      container.innerHTML = `
        <div class="article-view__header">
          <h1 class="article-view__title">${escapeHtml(article.title)}</h1>
          <div class="article-view__meta">
            <span class="article-view__meta-item">
              <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              ${escapeHtml(article.author)}
            </span>
            <span class="article-view__meta-item">
              <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
              Created ${formatDate(article.createdAt)}
            </span>
            <span class="article-view__meta-item">
              <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              Updated ${formatDate(article.updatedAt)}
            </span>
            <span class="badge ${getRoleBadgeClass(role)}">${role}</span>
          </div>
          ${article.tags && article.tags.length ? `
            <div class="flex gap-2 mt-3 flex-wrap">
              ${article.tags.map(tag => `<span class="tag tag--primary">${escapeHtml(tag)}</span>`).join('')}
            </div>
          ` : ''}
        </div>
        <div class="article-view__content">
          ${contentHtml}
        </div>
      `;
    }

    function renderHeaderActions(article) {
      const container = document.getElementById('header-actions');
      const user = WikiAPI.getUser();
      const rawRole = article.currentPermission || 'viewer';
      const role = rawRole.charAt(0).toUpperCase() + rawRole.slice(1);
      const isOwner = role === 'Owner';
      const canEdit = role === 'Owner' || role === 'Editor';

      let actionsHtml = `
        <a href="/history.html?id=${article._id}" class="btn btn--secondary btn--sm">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right: 6px;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          History
        </a>
      `;

      if (canEdit) {
        actionsHtml += `
          <a href="/editor.html?id=${article._id}" class="btn btn--primary btn--sm">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right: 6px;">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
            Edit
          </a>
        `;
      }

      if (isOwner) {
        actionsHtml += `
          <button class="btn btn--secondary btn--sm" onclick="openShareModal()">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right: 6px;">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
            </svg>
            Share
          </button>
          <button class="btn btn--danger btn--sm" onclick="deleteArticle()">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right: 6px;">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
            Delete
          </button>
        `;
      }

      container.innerHTML = actionsHtml;
    }

    // Share modal functions
    function openShareModal() {
      document.getElementById('share-modal').classList.add('active');
      loadShareList();
    }

    function closeShareModal() {
      document.getElementById('share-modal').classList.remove('active');
    }

    async function loadShareList() {
      const listEl = document.getElementById('share-list');
      listEl.innerHTML = '<div class="skeleton" style="height: 50px;"></div>';

      try {
        const article = await WikiAPI.getArticle(articleId);
        const ownerName = article.author;

        let html = `
          <div class="share-list__item">
            <div class="share-list__user">
              <div class="share-list__avatar">${ownerName.charAt(0).toUpperCase()}</div>
              <div class="share-list__info">
                <span class="share-list__name">${escapeHtml(ownerName)}</span>
                <span class="share-list__email">Owner</span>
              </div>
            </div>
            <span class="badge badge--owner">Owner</span>
          </div>
        `;

        if (article.sharedWith && article.sharedWith.length > 0) {
          html += article.sharedWith.map(share => `
            <div class="share-list__item">
              <div class="share-list__user">
                <div class="share-list__avatar">${(share.user?.username || 'U').charAt(0).toUpperCase()}</div>
                <div class="share-list__info">
                  <span class="share-list__name">${escapeHtml(share.user?.username || 'Unknown')}</span>
                  <span class="share-list__email">${share.permission === 'editor' ? 'Can edit' : 'Can view'}</span>
                </div>
              </div>
              <div class="flex items-center gap-2">
                <span class="badge ${share.permission === 'editor' ? 'badge--editor' : 'badge--viewer'}">
                  ${share.permission === 'editor' ? 'Editor' : 'Viewer'}
                </span>
                <button class="btn btn--danger btn--sm" onclick="removeShare('${share.user?._id}')">Remove</button>
              </div>
            </div>
          `).join('');
        }

        listEl.innerHTML = html;
      } catch (err) {
        listEl.innerHTML = '<p class="text-danger">Failed to load share list</p>';
      }
    }

    // Add share
    document.getElementById('share-add-btn').addEventListener('click', async () => {
      const email = document.getElementById('share-email').value.trim();
      const permission = document.getElementById('share-role').value;

      if (!email) {
        showToast('Please enter an email or username', 'error');
        return;
      }

      try {
        await WikiAPI.shareArticle(articleId, email, permission);
        showToast('User added successfully', 'success');
        document.getElementById('share-email').value = '';
        loadShareList();
      } catch (err) {
        showToast(err.message || 'Failed to add user', 'error');
      }
    });

    // Remove share
    window.removeShare = async function (userId) {
      if (!confirm('Remove this user\'s access?')) return;

      try {
        await WikiAPI.removeAccess(articleId, userId);
        showToast('Access removed', 'success');
        loadShareList();
      } catch (err) {
        showToast(err.message || 'Failed to remove access', 'error');
      }
    };

    // Delete article
    window.deleteArticle = async function () {
      if (!confirm('Are you sure you want to delete this article? This action cannot be undone.')) return;

      try {
        await WikiAPI.deleteArticle(articleId);
        showToast('Article deleted successfully', 'success');
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 500);
      } catch (err) {
        showToast(err.message || 'Failed to delete article', 'error');
      }
    };

    // Close modal on overlay click
    document.getElementById('share-modal').addEventListener('click', (e) => {
      if (e.target.id === 'share-modal') {
        closeShareModal();
      }
    });
  </script>
</body>

</html>
