<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Team Wiki — Collaborative documentation platform with Git integration" />
  <title>Team Wiki — Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <!-- ========== Navbar ========== -->
  <nav class="navbar">
    <div class="navbar__inner">
      <a href="/" class="navbar__brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        Team Wiki
      </a>
      <ul class="navbar__links">
        <li><a href="/" class="active">Dashboard</a></li>
        <li><a href="/editor">+ New Article</a></li>
      </ul>
      <div class="navbar__user" id="auth-area"></div>
    </div>
  </nav>

  <!-- ========== Main Content ========== -->
  <main class="container">
    <div class="page-header">
      <h1 class="page-header__title">Articles</h1>

      <!-- Search Bar -->
      <div class="search-bar">
        <span class="search-bar__icon">🔍</span>
        <input type="text" class="input" id="search-input" placeholder="Search articles…" />
      </div>
    </div>

    <!-- Article Grid -->
    <div class="article-grid" id="article-grid">
      <!-- Populated by app.js -->
      <div class="skeleton" style="height:120px"></div>
      <div class="skeleton" style="height:120px"></div>
      <div class="skeleton" style="height:120px"></div>
    </div>
  </main>

  <!-- ========== Auth Modal ========== -->
  <div class="modal-overlay" id="auth-modal">
    <div class="modal">
      <!-- Login Form -->
      <div id="login-form">
        <h2 class="modal__title">Login</h2>
        <div class="form-group">
          <label for="login-username">Username</label>
          <input type="text" class="input" id="login-username" placeholder="Enter username" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" class="input" id="login-password" placeholder="Enter password" />
        </div>
        <button class="btn btn--primary" id="login-submit" style="width:100%">Login</button>
        <p class="mt-2 text-center" style="font-size:0.85rem;color:var(--text-muted)">
          Don't have an account? <a href="#" id="switch-to-register">Register</a>
        </p>
      </div>

      <!-- Register Form (hidden by default) -->
      <div id="register-form" class="hidden">
        <h2 class="modal__title">Create Account</h2>
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input type="text" class="input" id="reg-username" placeholder="Choose username" />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" class="input" id="reg-password" placeholder="Choose password (min 6 chars)" />
        </div>
        <div class="form-group">
          <label for="reg-role">Role</label>
          <select class="input" id="reg-role">
            <option value="editor">Editor</option>
            <option value="viewer">Viewer</option>
          </select>
        </div>
        <button class="btn btn--primary" id="register-submit" style="width:100%">Register</button>
        <p class="mt-2 text-center" style="font-size:0.85rem;color:var(--text-muted)">
          Already have an account? <a href="#" id="switch-to-login">Login</a>
        </p>
      </div>
    </div>
  </div>

  <!-- ========== Scripts ========== -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.0/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@14.1.0/marked.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
